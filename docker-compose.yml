services:
  migrate:
    image: migrate/migrate:v4.18.1
    container_name: auth-migrate
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://auth:auth@postgres:5432/auth?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auth-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-api
    ports:
      - "${AUTH_HTTP_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      AUTH_HTTP_HOST: 0.0.0.0
      AUTH_HTTP_PORT: 8080
      AUTH_POSTGRES_HOST: postgres
      AUTH_POSTGRES_PORT: 5432
      AUTH_REDIS_ADDR: redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - auth-net

  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - auth-net

  redis:
    image: redis:7-alpine
    container_name: auth-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - auth-net

volumes:
  postgres_data:
  redis_data:

networks:
  auth-net:
    driver: bridge
