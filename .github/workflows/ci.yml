name: CI

on:
  push:
    branches: [main, develop, portfolio]
  pull_request:
    branches: [main, develop, portfolio]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auth
          POSTGRES_PASSWORD: auth
          POSTGRES_DB: auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auth -d auth"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      AUTH_JWT_ACCESS_SECRET: ci-access-secret-minimum-32-characters
      AUTH_JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters
      AUTH_POSTGRES_HOST: localhost
      AUTH_POSTGRES_PORT: 5432
      AUTH_POSTGRES_USER: auth
      AUTH_POSTGRES_PASSWORD: auth
      AUTH_POSTGRES_DATABASE: auth
      AUTH_REDIS_ADDR: localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12

      - name: Run tests
        run: go test ./... -race -count=1 -coverprofile=coverage.out

      - name: Build
        run: go build -o bin/auth-service ./cmd/api

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
